<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Dodge Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: none; /* Disables double-tap to zoom on mobile */
        }
        canvas {
            display: block;
            background-color: #0a0a0a;
            cursor: pointer;
            width: 100vw;
            height: 100dvh;
            max-width: 100%;
            max-height: 100dvh;
            touch-action: none;
        }
        .unselectable {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .modal {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        .modal-content {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            color: white;
            border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.1);
            max-width: 90%;
            width: 500px;
        }
        .hud {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            pointer-events: none;
        }
        .hud-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-width: min(72vw, 720px);
        }
        .hud-pill,
        .hud-button,
        .help-chip {
            border: 1px solid rgba(34, 211, 238, 0.28);
            background: rgba(3, 7, 18, 0.72);
            color: #e0f7ff;
            box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.08), 0 10px 24px rgba(0,0,0,0.22);
            backdrop-filter: blur(8px);
        }
        .hud-pill {
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            font-size: 0.95rem;
            font-weight: 700;
        }
        .hud-pill span {
            color: #67e8f9;
        }
        .hud-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            pointer-events: auto;
        }
        .hud-button {
            min-height: 44px;
            border-radius: 10px;
            padding: 0.55rem 0.85rem;
            font-weight: 800;
            cursor: pointer;
            touch-action: manipulation;
        }
        .help-chip {
            border-radius: 10px;
            padding: 0.45rem 0.65rem;
            font-size: 0.78rem;
            color: #cbd5e1;
            text-align: right;
        }
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                max-width: 95%;
                max-height: calc(100dvh - 2rem);
                overflow-y: auto;
                padding: 1.25rem;
            }
            #startButton {
                width: 100%;
                min-height: 48px;
            }
            .hud {
                top: 0.75rem;
                left: 0.75rem;
                right: 0.75rem;
            }
            .hud-group {
                max-width: 68vw;
            }
            .hud-pill {
                padding: 0.36rem 0.55rem;
                font-size: 0.78rem;
            }
            .help-chip {
                display: none;
            }
            .hud-button {
                min-width: 44px;
                padding: 0.5rem 0.65rem;
                font-size: 0.86rem;
            }
        }
        .gemini-button {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .gemini-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
        }
        .gemini-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .story-text {
            font-style: italic;
            color: #cbd5e1;
            margin-top: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen m-0 unselectable">

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Elements -->
    <div class="hud" aria-live="polite">
        <div class="hud-group">
            <div class="hud-pill">Score <span id="score">0</span></div>
            <div class="hud-pill">Best <span id="highScore">0</span></div>
            <div class="hud-pill">Stage <span id="stage">1</span></div>
            <div class="hud-pill">Shield <span id="shieldStatus">Empty</span></div>
        </div>
        <div class="hud-actions">
            <button id="pauseButton" class="hud-button" type="button">Pause</button>
            <div class="help-chip">Tap / Space to reverse<br>P to pause</div>
        </div>
    </div>

    <!-- Start/Game Over Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h1 id="modalTitle" class="text-4xl md:text-5xl font-bold mb-4 text-cyan-300">Orbital Dodge</h1>
            <p id="modalText" class="text-lg mb-6">Tap, click, or press Space to reverse orbit direction. Catch cyan shields. Dodge the red cubes.</p>
            <p id="finalScore" class="text-2xl mt-4 font-semibold hidden"></p>
            <button id="startButton" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 px-8 rounded-lg text-xl transition duration-300">Start Game</button>
            

        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const startButton = document.getElementById('startButton');
        const finalScoreEl = document.getElementById('finalScore');
        const stageEl = document.getElementById('stage');
        const shieldStatusEl = document.getElementById('shieldStatus');
        const pauseButton = document.getElementById('pauseButton');


        let player, center, projectiles, powerUps, particles, stars, score, highScore, animationId, isGameOver;
        let angle = 0;
        let orbitalDirection = 1; // 1 for counter-clockwise, -1 for clockwise
        let orbitalRadius, stage, spawnTimer, powerUpTimer, scoreTimer, lastFrame, isPaused, hasShield;


        // --- Game Setup and Control ---

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            center = { x: canvas.width / 2, y: canvas.height / 2 };
            orbitalRadius = Math.max(72, Math.min(canvas.width, canvas.height) / 5);
        }

        function createStars() {
            const count = Math.min(140, Math.max(55, Math.floor((canvas.width * canvas.height) / 14000)));
            stars = Array.from({ length: count }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.4 + 0.25,
                drift: Math.random() * 0.22 + 0.04,
                alpha: Math.random() * 0.55 + 0.2,
            }));
        }

        function init() {
            resizeCanvas();
            createStars();
            isGameOver = false;
            isPaused = false;
            hasShield = false;
            score = 0;
            stage = 1;
            spawnTimer = 0;
            powerUpTimer = 0;
            scoreTimer = 0;
            lastFrame = performance.now();
            angle = 0;
            orbitalDirection = 1;
            highScore = Number(localStorage.getItem('orbitalDodgeHighScore') || 0);
            updateHud();
            player = { x: center.x + orbitalRadius, y: center.y, radius: 15, color: '#00ffff' };
            projectiles = [];
            powerUps = [];
            particles = [];
            modal.style.display = 'none';
            finalScoreEl.classList.add('hidden');
            if (animationId) cancelAnimationFrame(animationId);
            pauseButton.textContent = 'Pause';
            animate(lastFrame);
        }

        function animate(timestamp = performance.now()) {
            if (isGameOver || isPaused) return;
            const deltaMs = Math.min(timestamp - lastFrame, 50);
            const delta = deltaMs / 16.67;
            lastFrame = timestamp;
            animationId = requestAnimationFrame(animate);

            spawnTimer += deltaMs;
            powerUpTimer += deltaMs;
            scoreTimer += deltaMs;
            stage = Math.min(12, Math.floor(score / 120) + 1);
            if (scoreTimer >= 250) {
                updateScore(1);
                scoreTimer = 0;
            }
            if (spawnTimer >= getSpawnDelay()) {
                spawnProjectile();
                spawnTimer = 0;
            }
            if (powerUpTimer >= 12000) {
                spawnPowerUp();
                powerUpTimer = 0;
            }

            ctx.fillStyle = 'rgba(10, 10, 10, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars(delta);
            ctx.beginPath();
            ctx.arc(center.x, center.y, 10, 0, Math.PI * 2, false);
            ctx.fillStyle = '#4a4a4a';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center.x, center.y, orbitalRadius, 0, Math.PI * 2, false);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.stroke();
            updatePlayer();
            drawPlayer();

            for (let index = projectiles.length - 1; index >= 0; index--) {
                const projectile = projectiles[index];
                projectile.update(delta);
                projectile.draw();
                const dist = Math.hypot(player.x - projectile.x, player.y - projectile.y);
                if (dist - projectile.size / 2 - player.radius < 1) {
                    if (hasShield) {
                        hasShield = false;
                        updateHud();
                        burst(player.x, player.y, '#67e8f9', 18);
                        projectiles.splice(index, 1);
                        continue;
                    }
                    endGame();
                    return;
                }
                if (dist - projectile.size / 2 - player.radius < 20 && !projectile.nearMissed) {
                    projectile.nearMissed = true;
                    updateScore(5);
                    burst(player.x, player.y, '#facc15', 5);
                }
                if (projectile.x + projectile.size < 0 || projectile.x - projectile.size > canvas.width || projectile.y + projectile.size < 0 || projectile.y - projectile.size > canvas.height) {
                    projectiles.splice(index, 1);
                    updateScore(10);
                }
            }

            for (let index = powerUps.length - 1; index >= 0; index--) {
                const powerUp = powerUps[index];
                powerUp.update(deltaMs);
                powerUp.draw();
                const dist = Math.hypot(player.x - powerUp.x, player.y - powerUp.y);
                if (dist < player.radius + powerUp.radius) {
                    hasShield = true;
                    updateHud();
                    burst(powerUp.x, powerUp.y, '#22d3ee', 16);
                    powerUps.splice(index, 1);
                } else if (powerUp.age > 7500) {
                    powerUps.splice(index, 1);
                }
            }

            updateParticles(delta);
            updateHud();
        }
        
        // --- Player Logic ---

        function drawStars(delta) {
            ctx.save();
            stars.forEach(star => {
                star.y += star.drift * delta;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#dffbff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawPlayer() {
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            if (hasShield) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(103, 232, 249, 0.9)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        function updatePlayer() {
            angle += (0.018 + stage * 0.0015) * orbitalDirection;
            player.x = center.x + Math.cos(angle) * orbitalRadius;
            player.y = center.y + Math.sin(angle) * orbitalRadius;
        }
        
        function switchDirection() {
            if(!player || isGameOver || isPaused) return;
            orbitalDirection *= -1;
            burst(player.x, player.y, '#00ffff', 6);
        }

        // --- Projectile Logic ---

        class Projectile {
            constructor(x, y, velocity, size, color, spin) {
                this.x = x;
                this.y = y;
                this.velocity = velocity;
                this.size = size;
                this.color = color;
                this.spin = spin;
                this.angle = Math.random() * Math.PI;
                this.nearMissed = false;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
            update(delta) {
                this.x += this.velocity.x * delta;
                this.y += this.velocity.y * delta;
                this.angle += this.spin * delta;
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 11;
                this.age = 0;
            }
            update(deltaMs) {
                this.age += deltaMs;
            }
            draw() {
                const pulse = Math.sin(this.age / 160) * 3;
                ctx.save();
                ctx.strokeStyle = 'rgba(34, 211, 238, 0.35)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 9 + pulse, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#67e8f9';
                ctx.shadowColor = '#67e8f9';
                ctx.shadowBlur = 16;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnProjectile() {
            const size = Math.random() * 18 + 10 + Math.min(stage, 6);
            const color = '#ff4d4d';
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - size : canvas.width + size;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - size : canvas.height + size;
            }
            const angleToCenter = Math.atan2(center.y - y, center.x - x);
            const speed = 1.25 + stage * 0.18 + Math.random() * 0.6;
            const velocity = { x: Math.cos(angleToCenter) * speed, y: Math.sin(angleToCenter) * speed };
            const spin = (Math.random() - 0.5) * 0.08;
            projectiles.push(new Projectile(x, y, velocity, size, color, spin));
            if (stage >= 5 && Math.random() < 0.22) {
                setTimeout(() => {
                    if (!isGameOver && !isPaused) spawnProjectile();
                }, 180);
            }
        }

        function spawnPowerUp() {
            if (hasShield || powerUps.length) return;
            const theta = Math.random() * Math.PI * 2;
            powerUps.push(new PowerUp(
                center.x + Math.cos(theta) * orbitalRadius,
                center.y + Math.sin(theta) * orbitalRadius
            ));
        }

        function getSpawnDelay() {
            return Math.max(360, 980 - stage * 70);
        }

        function burst(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2.5 + 0.8;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(theta) * speed,
                    vy: Math.sin(theta) * speed,
                    life: 1,
                    color,
                });
            }
        }

        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                p.life -= 0.035 * delta;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // --- Game State & UI ---

        function updateHud() {
            scoreEl.innerText = score;
            highScoreEl.innerText = highScore;
            stageEl.innerText = stage;
            shieldStatusEl.innerText = hasShield ? 'Ready' : 'Empty';
            shieldStatusEl.style.color = hasShield ? '#67e8f9' : '#94a3b8';
        }

        function updateScore(points) {
            score += points;
            if (score > highScore) {
                highScore = score;
                highScoreEl.innerText = highScore;
            }
            updateHud();
        }

        function setPaused(paused) {
            if (!player || isGameOver) return;
            isPaused = paused;
            pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
            if (isPaused) {
                cancelAnimationFrame(animationId);
                modal.style.display = 'flex';
                modalTitle.innerText = 'Paused';
                modalText.innerText = 'Take a breath. Tap Resume, press P, or press Space to continue.';
                finalScoreEl.classList.add('hidden');
                startButton.innerText = 'Resume';
            } else {
                modal.style.display = 'none';
                lastFrame = performance.now();
                animate(lastFrame);
            }
        }

        function togglePause() {
            if (!player) return;
            setPaused(!isPaused);
        }

        async function endGame() {
            isGameOver = true;
            isPaused = false;
            cancelAnimationFrame(animationId);
            pauseButton.textContent = 'Pause';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('orbitalDodgeHighScore', highScore);
                highScoreEl.innerText = highScore;
            }
            
            modal.style.display = 'flex';
            modalTitle.innerText = 'Game Over';
            finalScoreEl.innerText = `Final Score: ${score}`;
            finalScoreEl.classList.remove('hidden');
            startButton.innerText = 'Play Again';
            modalText.innerText = hasShield ? 'Shield spent. The next hit got through.' : 'You were hit!';
        }

        async function showStartScreen() {
             modal.style.display = 'flex';
             modalText.innerText = 'Tap, click, or press Space to reverse orbit direction. Catch cyan shields. Dodge the red cubes.';
             startButton.innerText = 'Start Game';
             finalScoreEl.classList.add('hidden');
             modalTitle.innerText = 'Orbital Dodge';
        }

        // --- Event Listeners ---

        window.addEventListener('resize', () => {
            const oldCenter = center || { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            resizeCanvas();
            createStars();
            if (player) {
                player.x += center.x - oldCenter.x;
                player.y += center.y - oldCenter.y;
            }
        });

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            switchDirection();
        });
        
        startButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPaused && !isGameOver) {
                setPaused(false);
                return;
            }
            init();
        });

        pauseButton.addEventListener('click', togglePause);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                if (isPaused && !isGameOver) {
                    setPaused(false);
                } else {
                    switchDirection();
                }
            }
            if (e.key.toLowerCase() === 'p') {
                e.preventDefault();
                togglePause();
            }
            if (e.key === 'Escape' && !isGameOver) {
                setPaused(true);
            }
        });

        // Initial call to show start screen
        window.onload = () => {
            resizeCanvas();
            createStars();
            highScore = Number(localStorage.getItem('orbitalDodgeHighScore') || 0);
            score = 0;
            stage = 1;
            hasShield = false;
            updateHud();
            showStartScreen();
        };

    </script>
</body>
</html>
